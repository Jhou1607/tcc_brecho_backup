<div class="filter-manager-container">
  <div class="manager-header">
    <h2>Gerenciar Filtros</h2>
    <p>Configure as opções disponíveis para cada tipo de filtro</p>
  </div>

  <div class="tabs-container">
    <div class="tabs">
      <button 
        *ngFor="let type of filterTypes"
        class="tab-btn"
        [class.active]="activeTab === type.key"
        (click)="setActiveTab(type.key)"
      >
        {{ type.label }}
      </button>
    </div>

    <div class="tab-content">
      <div class="content-header">
        <h3>{{ getActiveTabLabel() }}</h3>
        <div class="add-option">
          <input 
            type="text" 
            placeholder="Nova opção..."
            [(ngModel)]="newOptionName"
            (keyup.enter)="addFilterOption()"
          >
          <button class="add-btn" (click)="addFilterOption()">
            <i class="fas fa-plus"></i>
            Adicionar
          </button>
        </div>
      </div>

      <div class="loading-spinner" *ngIf="loading">
        <i class="fas fa-spinner fa-spin"></i>
        <p>Carregando opções...</p>
      </div>

      <div class="options-list" *ngIf="!loading">
        <div class="option-item" *ngFor="let option of filterOptions[activeTab]">
          <span class="option-name">{{ option.name }}</span>
          <div class="option-actions">
            <button class="action-btn edit" (click)="editFilterOption(option)">
              <i class="fas fa-edit"></i>
            </button>
            <button class="action-btn delete" (click)="deleteFilterOption(option)">
              <i class="fas fa-trash"></i>
            </button>
          </div>
        </div>

        <div class="no-options" *ngIf="filterOptions[activeTab]?.length === 0">
          <i class="fas fa-filter"></i>
          <p>Nenhuma opção encontrada</p>
        </div>
      </div>
    </div>
  </div>
</div>
