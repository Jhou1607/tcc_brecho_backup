<div class="product-list-container">
  <div class="list-header">
    <div class="header-content">
      <h2>Gerenciar Produtos</h2>
      <p>Lista de todos os produtos cadastrados</p>
    </div>
    <button class="add-btn" (click)="addNewProduct()">
      <i class="fas fa-plus"></i>
      Adicionar Produto
    </button>
  </div>

  <div class="search-bar">
    <div class="search-input">
      <i class="fas fa-search"></i>
      <input 
        type="text" 
        placeholder="Buscar produtos..." 
        [(ngModel)]="searchTerm"
      >
    </div>
  </div>

  <div class="table-container" *ngIf="!loading">
    <table class="product-table">
      <thead>
        <tr>
          <th>Imagem</th>
          <th>Nome</th>
          <th>Categoria</th>
          <th>Preço</th>
          <th>Marca</th>
          <th>Cor</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let product of filteredProducts">
          <td class="image-cell">
            <img 
              [src]="product.image_url || 'assets/produtos/placeholder-product.png'" 
              [alt]="product.nome_produto"
              class="product-image"
            >
          </td>
          <td>{{ product.nome_produto }}</td>
          <td>
            <span class="category-badge">{{ product.categoria }}</span>
          </td>
          <td>R$ {{ product.preco.toFixed(2) }}</td>
          <td>{{ product.marca }}</td>
          <td>
            <span class="color-badge" [style.background-color]="product.cor"></span>
            {{ product.cor }}
          </td>
          <td class="actions-cell">
            <button class="action-btn edit" (click)="editProduct(product)">
              <i class="fas fa-edit"></i>
            </button>
            <button class="action-btn delete" (click)="deleteProduct(product)">
              <i class="fas fa-trash"></i>
            </button>
          </td>
        </tr>
      </tbody>
    </table>

    <div class="no-products" *ngIf="filteredProducts.length === 0">
      <i class="fas fa-box-open"></i>
      <p>Nenhum produto encontrado</p>
    </div>
  </div>

  <div class="loading-spinner" *ngIf="loading">
    <i class="fas fa-spinner fa-spin"></i>
    <p>Carregando produtos...</p>
  </div>
</div>
